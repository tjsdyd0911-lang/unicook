{% include 'include/head.html' %}
  <main class="container">
       <!-- 상품 상세 메인 카드 박스 -->
        <div class="product-detail-container p-4 p-md-5 shadow-sm bg-white rounded-4 mb-5">
            <div class="row g-5 align-items-center">
                <!-- 좌측: 상품 이미지 (둥근 모서리 적용) -->
                <div class="col-md-6">
                    <div class="product-img-box">
                        <img src="{{item.image}}" class="img-fluid rounded-4 shadow-sm">
                    </div>
                </div>
                <!-- 우측: 상품 상세 정보 -->
                <div class="col-md-6">
                    <!-- 1. 카테고리 (작고 연하게) -->
                    <div class="product-category text-muted mb-2" style="font-size: 0.9rem;">
                        {{item.category}}
                    </div>
                
                    <!-- 2. 상품명 (검정색, 굵게) -->
                    <h2 class="product-title fw-bold text-dark mb-3">
                        {{item.item_name}}
                    </h2>
        
                    <!-- 3. 가격 (오렌지색 포인트) -->
                    <div class="product-price-large fw-bold mb-4" style="color: #fa622f; font-size: 2rem;">
                        {{item.price}}
                    </div>
        
                    <!-- 구분선 -->
                    <hr class="text-secondary opacity-25 mb-4">
        
                    <!-- 4. 상세 메타 정보 (아이콘 + 텍스트) -->
                    <div class="product-info-list mb-2">
                        <div class="d-flex align-items-center mb-3">
                            <span class="info-label me-3 text-dark"><i class="fa-solid fa-truck text-danger me-2"></i>배송정보:</span>
                            <span class="info-value text-secondary">샛별배송 / 택배배송</span>
                        </div>
                        <div class="d-flex align-items-center mb-3">
                            <span class="info-label me-3 text-dark"><i class="fa-solid fa-scale-balanced text-muted me-2"></i>판매단위(중량):</span>
                            <span class="info-value text-secondary">{{item.weight}}</span>
                        </div>
                    </div>
                    <!-- 수량 조절 -->
                    <div class="d-flex align-items-center gap-2 mb-5">
                        <button class="qty-btn" onclick="QtyMinus(this);"><i class="fa-solid fa-minus fa-xs"></i></button>
                        <span class="qtyCount px-2">1</span>
                        <button class="qty-btn" onclick="QtyPlus(this);"><i class="fa-solid fa-plus fa-xs"></i></button>
                    </div>
                    <!-- 5. 버튼 영역 -->
                    <div class="d-flex gap-3 mt-auto">
                        <!-- 장바구니 버튼: 흰 배경 + 회색 테두리 -->
                        <button onclick="CartAdd({{item.code}});" class="btn btn-outline-secondary flex-grow-1 py-3 rounded-3 bg-white text-dark border-secondary border-opacity-25 shadow-none">
                            <i class="fa-solid fa-cart-shopping me-2"></i>장바구니 담기
                        </button>
                        <!-- 구매하기 버튼: 갈색 배경 -->
                        <button class="btn btn-sand flex-grow-1 py-3 rounded-3 fw-bold border-0 shadow-none" style="background-color: #8b7355; color: white;">
                            <a href="purchase.do">바로 구매하기</a>
                        </button>
                       
                    </div>
                </div>
            </div>
        </div>
        <!-- [중간] 추천 섹션 -->
        <section class="mb-5">
            <div class="d-flex justify-content-between align-items-end mb-4 border-bottom pb-2">
                <h4 class="fw-bold mb-0">
                    <span class="text-warning">★</span> 함께하면 더 맛있는 추천 음식
                </h4>
            </div>
            <div class="row g-4 text-center" id="reco_items">
                {% for item in reco_items %}
                    <div class="col-6 col-md-3"><a href="/view.do?code={{item.code}}"><div class="product-card"><img src="{{item.image}}"><div class="product-name">{{item.item_name}}</div><div class="product-price">{{item.price}}</div></div></a></div>
                {% endfor %}
            </div>
            <br>
            <div class="analysis-banner text-center" onclick="ShowBunsuk('view')">
                <i class="fa-solid fa-chart-line fs-1 mb-3"></i>
                <h4 class="fw-bold">연관 상품 분석 확인하기</h4>
                <p class="mb-0 opacity-75">클릭하면 상단에 추천 상품이 나옵니다.</p>
            </div>
        </section>
    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
